<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisCenter</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- Header -->
  <div id="header">
    <img id="logo-img" src="img/logo.png" alt="VisCenter" />
    <div id="header-actions">
      <button id="btn-add" class="icon-btn" title="添加文件">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Search Bar -->
  <div id="search-bar">
    <div id="search-wrap">
      <svg class="search-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.4" />
        <line x1="8.5" y1="8.5" x2="11" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      </svg>
      <input type="text" id="search-input" placeholder="搜索文件…" />
      <button id="search-clear" class="icon-btn hidden">✕</button>
    </div>
    <div id="view-toggle">
      <button id="btn-grid" class="view-btn active" title="图标视图">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3" />
          <rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3" />
          <rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3" />
          <rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3" />
        </svg>
      </button>
      <button id="btn-list" class="view-btn" title="列表视图">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="1" y1="3" x2="13" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          <line x1="1" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>

  <!-- File Count Bar -->
  <div id="info-bar">
    <span id="file-count">0 个文件</span>
  </div>

  <!-- Drop Zone / File Grid -->
  <div id="drop-zone" class="view-grid">
    <div id="empty-state">
      <div id="empty-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="8" y="12" width="32" height="28" rx="3" stroke="currentColor" stroke-width="1.5"
            stroke-dasharray="4 3" />
          <polyline points="19,22 24,17 29,22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <line x1="24" y1="17" x2="24" y2="31" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </div>
      <p class="empty-hint">拖入 AI · PDF · EPS 文件</p>
      <p class="empty-sub">或点击右上角 <strong>+</strong> 添加</p>
    </div>
    <div id="file-grid"></div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden">
    <div class="menu-item" id="ctx-open">在 Illustrator 中打开</div>
    <div class="menu-item" id="ctx-edit-name">编辑显示名称</div>
    <div class="menu-item" id="ctx-edit-icon">更换图标</div>
    <div class="menu-separator"></div>
    <div class="menu-item" id="ctx-reveal">在 Finder 中显示</div>
    <div class="menu-separator"></div>
    <div class="menu-item danger" id="ctx-remove">从面板移除</div>
  </div>

  <!-- Edit Name Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-title">编辑显示名称</div>
      <input type="text" id="modal-input" maxlength="100" />
      <div id="modal-actions">
        <button id="modal-cancel" class="btn-secondary">取消</button>
        <button id="modal-confirm" class="btn-primary">确认</button>
      </div>
    </div>
  </div>

  <!-- Icon Picker Modal -->
  <div id="icon-modal-overlay" class="hidden">
    <div id="icon-modal">
      <div id="modal-title">更换图标</div>

      <!-- Custom image upload area -->
      <div id="custom-img-area">
        <div id="custom-img-drop" title="点击或拖入图片">
          <div id="custom-img-preview"></div>
          <div id="custom-img-hint">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="2" y="4" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3" />
              <circle cx="6.5" cy="8" r="1.5" stroke="currentColor" stroke-width="1.2" />
              <polyline points="2,13 6,9 9,11 12,8 16,13" stroke="currentColor" stroke-width="1.2"
                stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>上传自定义图片</span>
          </div>
        </div>
      </div>

      <div class="icon-section-label">预设图标</div>
      <div id="icon-grid">
        <div class="icon-option" data-icon="default" title="默认">
          <div class="icon-preview default-icon">AI</div>
        </div>
        <div class="icon-option" data-icon="pdf" title="PDF">
          <div class="icon-preview pdf-icon">PDF</div>
        </div>
        <div class="icon-option" data-icon="eps" title="EPS">
          <div class="icon-preview eps-icon">EPS</div>
        </div>
        <div class="icon-option" data-icon="star" title="星形">
          <div class="icon-preview emoji-icon">⭐</div>
        </div>
        <div class="icon-option" data-icon="palette" title="调色板">
          <div class="icon-preview emoji-icon">🎨</div>
        </div>
        <div class="icon-option" data-icon="folder" title="文件夹">
          <div class="icon-preview emoji-icon">📁</div>
        </div>
        <div class="icon-option" data-icon="book" title="手册">
          <div class="icon-preview emoji-icon">📖</div>
        </div>
        <div class="icon-option" data-icon="globe" title="品牌">
          <div class="icon-preview emoji-icon">🌐</div>
        </div>
        <div class="icon-option" data-icon="lightning" title="快速">
          <div class="icon-preview emoji-icon">⚡</div>
        </div>
        <div class="icon-option" data-icon="diamond" title="钻石">
          <div class="icon-preview emoji-icon">💎</div>
        </div>
        <div class="icon-option" data-icon="fire" title="热门">
          <div class="icon-preview emoji-icon">🔥</div>
        </div>
        <div class="icon-option" data-icon="flag" title="旗帜">
          <div class="icon-preview emoji-icon">🚩</div>
        </div>
      </div>
      <div id="icon-modal-actions">
        <button id="icon-modal-cancel" class="btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="file-input" accept=".ai,.pdf,.eps,.svg" multiple style="display:none" />
  <input type="file" id="icon-img-input" accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml,image/bmp"
    style="display:none" />

  <script src="js/CSInterface.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/fileIcons.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
